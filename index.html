<!DOCTYPE html>
<html>
<head>
	<title>Mini Paint Application</title>
	<link rel="stylesheet" href="MiniPaint.css" />
	<link rel="icon" type="image/png" href="media/images/pencil.jpg">
	<script src="MiniPaint.js"></script>
	<meta charset="utf-8">
</head>
<body>
	<div class="flexContainer">
		<div class="leftMenu">
			<div id="tools">
				<img src="media/images/pencil.jpg" class="tool active" name="pencil" />
				<img src="media/images/eraser.jpg" class="tool" name="eraser" />
				<img src="media/images/line.jpg" class="tool" name="line" />
				<img src="media/images/circle.jpg" class="tool" name="ellipse" />
				<img src="media/images/rectangle.jpg" class="tool" name="rectangle" />
				<img src="media/images/soundOn.jpg" class="tool" name="toggleSound" id="toggleSound" />
			</div>
			<div id="settings">
				<p>Width <span class="rangeLabel" id="widthRangeLabel">5</span></p>
				<input type="range" name="width" min="1" max="50" value="5" class="settings" id="width">
				<p>Color</p>
				<input type="color" name="color" id="color" class="settings">
			</div>
			<div class="leftMenuFooter">
				<p>Mini Paint ®</p>
			</div>
		</div>
		<div class="workingArea">
			<div>
				<canvas width="1175" height="700"></canvas>
			</div>
			<div class="rightMenu">
				<img src="media/images/save.jpg" class="tool" name="saveImage" id="saveImage" />
				<img src="media/images/bin.jpg" class="tool" name="clearCanvas" id="clearCanvas" />
			</div>
		</div>
	</div>
</body>
</html>
